services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.01-py3
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HUGGINGFACEHUB_API_TOKEN:-${HF_TOKEN:-}}
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACEHUB_API_TOKEN:-${HF_TOKEN:-}}
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    command: >
      vllm serve Qwen/Qwen2.5-VL-72B-Instruct-AWQ
      --max-model-len 8192
      --quantization awq_marlin
      --dtype float16
      --gpu-memory-utilization 0.80
      --trust-remote-code
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
